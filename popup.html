<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VeloRecord Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="header">
      <div class="logo-container">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" width="24" height="24">
            <defs>
              <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#FF2E93" />
                <stop offset="100%" stop-color="#FF8A00" />
              </linearGradient>
            </defs>
            <circle cx="12" cy="12" r="10" fill="url(#logo-grad)" />
            <polygon points="10,8 16,12 10,16" fill="#FFF" />
          </svg>
        </div>
        <span class="logo-text">VeloRecord <span class="logo-badge">Pro</span></span>
      </div>
      <button class="settings-btn" id="open-dashboard-btn" title="Open Dashboard">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
      </button>
    </header>

    <!-- Recording Mode Selector -->
    <div class="modes-grid">
      <button class="mode-card active" data-mode="screen-cam">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
            <line x1="8" y1="21" x2="16" y2="21"></line>
            <line x1="12" y1="17" x2="12" y2="21"></line>
            <circle cx="18" cy="8" r="2" fill="currentColor"></circle>
          </svg>
        </div>
        <span class="card-title">Screen + Cam</span>
      </button>

      <button class="mode-card" data-mode="screen">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
            <line x1="8" y1="21" x2="16" y2="21"></line>
            <line x1="12" y1="17" x2="12" y2="21"></line>
          </svg>
        </div>
        <span class="card-title">Screen Only</span>
      </button>

      <button class="mode-card" data-mode="camera">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
            <circle cx="12" cy="13" r="4"></circle>
          </svg>
        </div>
        <span class="card-title">Camera Only</span>
      </button>
    </div>

    <!-- Toggles List -->
    <div class="settings-section">
      <div class="setting-row">
        <div class="setting-info">
          <div class="setting-icon mic-icon">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
              <path d="M19 10v1a7 7 0 0 1-14 0v-1"></path>
              <line x1="12" y1="19" x2="12" y2="23"></line>
              <line x1="8" y1="23" x2="16" y2="23"></line>
            </svg>
          </div>
          <div class="setting-labels">
            <span class="setting-title">Record Microphone</span>
            <span class="setting-subtitle" id="mic-device-name">Default microphone</span>
          </div>
        </div>
        <label class="switch">
          <input type="checkbox" id="mic-toggle" checked>
          <span class="slider"></span>
        </label>
      </div>

      <div class="setting-row">
        <div class="setting-info">
          <div class="setting-icon cam-icon">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 7l-7 5 7 5V7z"></path>
              <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
            </svg>
          </div>
          <div class="setting-labels">
            <span class="setting-title">Camera Preview</span>
            <span class="setting-subtitle" id="cam-device-name">Webcam bubble overlay</span>
          </div>
        </div>
        <label class="switch">
          <input type="checkbox" id="cam-toggle" checked>
          <span class="slider"></span>
        </label>
      </div>

      <div class="setting-row">
        <div class="setting-info">
          <div class="setting-icon timer-icon">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
          </div>
          <div class="setting-labels">
            <span class="setting-title">Countdown Timer</span>
            <span class="setting-subtitle">Show countdown before starting</span>
          </div>
        </div>
        <div class="select-wrapper">
          <select id="countdown-select">
            <option value="3">3 Seconds</option>
            <option value="5">5 Seconds</option>
            <option value="0">None</option>
          </select>
        </div>
      </div>
    </div>

    <!-- CTA Button -->
    <div class="action-container">
      <button class="primary-btn" id="start-btn">
        <div class="btn-pulse"></div>
        <span>Start Recording</span>
      </button>
    </div>

    <!-- Recent recordings section -->
    <div class="recent-section">
      <span class="section-heading">Recent Recordings</span>
      <div class="recent-list" id="recent-recordings-list">
        <div class="empty-state">No recordings yet. Make your first video!</div>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
