<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ViewDrop - Capture Engine</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0f0c1b;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .container {
      text-align: center;
      max-width: 480px;
      padding: 40px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }
    .spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-left-color: #ff2e93;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 12px;
      background: linear-gradient(90deg, #ff2e93, #ff8a00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      color: #a0aec0;
      font-size: 14px;
      line-height: 1.6;
    }
    .btn {
      margin-top: 24px;
      background: linear-gradient(90deg, #ff2e93, #ff8a00);
      color: white;
      border: none;
      padding: 12px 28px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(255, 46, 147, 0.3);
      transition: all 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 46, 147, 0.4);
    }
    .controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 24px;
    }
    .ctrl-btn {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 10px 20px;
      font-size: 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .ctrl-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    .ctrl-btn.stop {
      background: rgba(255, 46, 147, 0.2);
      border-color: rgba(255, 46, 147, 0.5);
    }
    .ctrl-btn.stop:hover {
      background: rgba(255, 46, 147, 0.4);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <h1 id="status-title">Initializing Stream Capture</h1>
    <p id="status-desc">Please choose the screen, window, or tab you want to record when the Chrome selector pops up.</p>
    <button id="manual-btn" class="btn" style="display: none;">Select Screen</button>
    <div id="controls-bar" class="controls" style="display: none;">
      <button id="pause-btn" class="ctrl-btn">Pause</button>
      <button id="resume-btn" class="ctrl-btn" style="display: none;">Resume</button>
      <button id="stop-btn" class="ctrl-btn stop">Stop</button>
    </div>
  </div>
  <script src="webm-duration-fix.js"></script>
  <script src="recorder.js"></script>
</body>
</html>
